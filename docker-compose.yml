services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nutritionuser
      POSTGRES_PASSWORD: nutritionpass
      POSTGRES_DB: nutritiondb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutritionuser -d nutritiondb"]
      interval: 3s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11435:11434"

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://nutritionuser:nutritionpass@db:5432/nutritiondb
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:1b
      VISION_MODEL: llava:7b
      USDA_API_KEY: ${USDA_API_KEY:-DEMO_KEY}
      API_KEY: ${API_KEY:-dev-key}
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      API_URL: http://app:8000
      API_KEY: ${API_KEY:-dev-key}
    ports:
      - "8502:8501"
    depends_on:
      - app

volumes:
  postgres_data:
  ollama_data:
